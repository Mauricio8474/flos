services:
  flos-db:
    image: postgres:15-alpine
    container_name: flos_production_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - flos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flos-app:
    build: .
    container_name: flos_backend_app
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@flos-db:5432/${POSTGRES_DB}"
    depends_on:
      flos-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/dashboard/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  flos_postgres_data:
