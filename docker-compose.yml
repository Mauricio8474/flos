version: '3.8'

services:
  flos-db:
    image: postgres:15-alpine
    container_name: flos_production_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - flos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flos-app:
    build: .
    container_name: flos_backend_app
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://flos_admin:flos_secure_password@flos-db:5432/flos_core"
    depends_on:
      flos-db:
        condition: service_healthy

volumes:
  flos_postgres_data: